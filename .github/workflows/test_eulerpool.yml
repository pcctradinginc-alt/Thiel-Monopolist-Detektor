name: Test Eulerpool API

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests -q
      - name: Probe Eulerpool API endpoints
        env:
          EULERPOOL_API_KEY: ${{ secrets.EULERPOOL_API_KEY }}
        run: |
          python3 - << 'PYEOF'
          import requests, os, json

          token = os.environ.get("EULERPOOL_API_KEY", "")
          print(f"Token: {len(token)} chars, prefix: {token[:10]}...")

          # Try multiple base URLs and auth methods
          bases = [
              "https://api.eulerpool.com",
              "https://api.eulerpool.com/api",
          ]
          auths = {
              "Bearer": {"Authorization": f"Bearer {token}"},
              "Token": {"Authorization": f"Token {token}"},
              "apikey_header": {"apikey": token},
              "X-API-Key": {"X-API-Key": token},
          }

          # Probe root to find API structure
          for base in bases:
              r = requests.get(base, headers={"Authorization": f"Bearer {token}"}, timeout=8)
              print(f"ROOT {base}: {r.status_code} → {r.text[:200]}")

          # SAP ISIN: DE0007164600
          sap_isin = "DE0007164600"
          endpoints = [
              f"/v1/stock/{sap_isin}",
              f"/v1/company/{sap_isin}",
              f"/v1/equity/{sap_isin}",
              f"/v1/fundamentals/{sap_isin}",
              f"/v1/{sap_isin}/fundamentals",
              f"/v1/stock/{sap_isin}/fundamentals",
              f"/v1/stock/DE000SAP ISIN/profile",
              "/v1/screener/equity?country=DE&limit=10",
              "/v1/screener?country=DE&limit=10",
              "/v1/stocks?country=DE&limit=10",
              "/v1/equity?country=DE&limit=10",
              "/v1/markets/XETRA/stocks?limit=10",
          ]

          for ep in endpoints:
              for auth_name, auth_header in auths.items():
                  r = requests.get(f"https://api.eulerpool.com{ep}",
                                   headers=auth_header, timeout=8)
                  if r.status_code == 200:
                      print(f"\n✅ [{auth_name}] {ep}")
                      print(r.text[:400])
                      break
                  elif r.status_code not in (404, 403, 405):
                      print(f"  [{auth_name}] {r.status_code} {ep}: {r.text[:100]}")
          PYEOF
