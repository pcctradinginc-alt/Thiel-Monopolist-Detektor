name: Deploy Cloudflare Worker

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Worker via Cloudflare API
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GH_LABEL_TOKEN: ${{ secrets.FEEDBACK_GITHUB_TOKEN }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          # Get Account ID via token verification endpoint
          CF_RESPONSE=$(curl -s "https://api.cloudflare.com/client/v4/accounts?per_page=1" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json")
          echo "CF accounts response: $CF_RESPONSE" | head -c 300

          ACCOUNT_ID=$(echo "$CF_RESPONSE" | python3 -c "
import sys, json
d = json.load(sys.stdin)
results = d.get('result') or []
if results:
    print(results[0]['id'])
else:
    # Try errors for debugging
    print('ERRORS:', d.get('errors'), file=sys.stderr)
    sys.exit(1)
")
          echo "Account ID: $ACCOUNT_ID"

          # Upload worker script
          SCRIPT=$(cat cloudflare-worker/worker.js)
          METADATA='{"main_module":"worker.js"}'

          curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/workers/scripts/thiel-feedback" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -F "metadata=$METADATA;type=application/json" \
            -F "worker.js=$SCRIPT;type=application/javascript+module" | \
            python3 -c "import sys,json; r=json.load(sys.stdin); print('Deploy OK' if r.get('success') else f'Deploy FAILED: {r}')"

          # Set GH_LABEL_TOKEN secret
          curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/workers/scripts/thiel-feedback/secrets" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"GH_LABEL_TOKEN\",\"text\":\"$GH_LABEL_TOKEN\",\"type\":\"secret_text\"}" | \
            python3 -c "import sys,json; r=json.load(sys.stdin); print('Secret GH_LABEL_TOKEN:', 'OK' if r.get('success') else r)"

          # Set WEBHOOK_SECRET
          curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/workers/scripts/thiel-feedback/secrets" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"WEBHOOK_SECRET\",\"text\":\"$WEBHOOK_SECRET\",\"type\":\"secret_text\"}" | \
            python3 -c "import sys,json; r=json.load(sys.stdin); print('Secret WEBHOOK_SECRET:', 'OK' if r.get('success') else r)"

          # Enable workers.dev subdomain
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/workers/scripts/thiel-feedback/subdomain" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"enabled":true}' > /dev/null

          # Get subdomain
          SUBDOMAIN=$(curl -s \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/workers/subdomain" \
            -H "Authorization: Bearer $CF_TOKEN" | \
            python3 -c "import sys,json; print(json.load(sys.stdin).get('result',{}).get('subdomain','unknown'))")

          echo ""
          echo "✅ Worker deployed!"
          echo "🌐 Worker URL: https://thiel-feedback.$SUBDOMAIN.workers.dev"
          echo ""
          echo "➡️  Jetzt als GitHub Secret setzen:"
          echo "   Name:  WORKER_URL"
          echo "   Value: https://thiel-feedback.$SUBDOMAIN.workers.dev"
