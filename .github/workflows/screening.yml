name: Weekly Thiel Screening

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:       # Manual trigger
    inputs:
      dry_run:
        description: 'Dry run (no alerts sent)'
        required: false
        default: 'false'
        type: boolean
      max_companies:
        description: 'Limit number of companies (for testing)'
        required: false
        default: ''
      single_ticker:
        description: 'Analyze single ticker only'
        required: false
        default: ''

jobs:
  screening:
    runs-on: ubuntu-latest
    timeout-minutes: 330  # 5.5 hours (< 6h GitHub limit)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore database from latest release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data
          # Try to download DB from latest release asset
          LATEST=$(gh release view --json tagName -q .tagName 2>/dev/null || echo "")
          if [ -n "$LATEST" ]; then
            gh release download "$LATEST" -p "thiel_detector.db" -D data/ 2>/dev/null && \
              echo "✓ Database restored from release $LATEST" || \
              echo "No database in release — starting fresh"
          else
            echo "No releases yet — starting fresh"
          fi
        shell: bash

      - name: Copy example config if needed
        run: |
          if [ ! -f config/config.yaml ]; then
            cp config/config.example.yaml config/config.yaml
            echo "Using example config"
          fi

      - name: Run screening
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TURSO_URL: ${{ secrets.TURSO_URL }}
          TURSO_TOKEN: ${{ secrets.TURSO_TOKEN }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi

          MAX_FLAG=""
          if [ -n "${{ github.event.inputs.max_companies }}" ]; then
            MAX_FLAG="--max-companies ${{ github.event.inputs.max_companies }}"
          fi

          TICKER_FLAG=""
          if [ -n "${{ github.event.inputs.single_ticker }}" ]; then
            TICKER_FLAG="--ticker ${{ github.event.inputs.single_ticker }}"
          fi

          python src/main.py --mode full $DRY_RUN_FLAG $MAX_FLAG $TICKER_FLAG

      - name: Upload database as release asset
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f data/thiel_detector.db ]; then
            DATE=$(date +%Y-%m-%d)
            TAG="db-$DATE"
            # Create release (or update if exists)
            gh release create "$TAG" data/thiel_detector.db \
              --title "Database $DATE" \
              --notes "Automated weekly database snapshot" \
              --latest=false 2>/dev/null || \
            gh release upload "$TAG" data/thiel_detector.db --clobber 2>/dev/null || \
            echo "Release upload failed — DB not persisted"
          fi
        shell: bash

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screening-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30

      - name: Print run summary
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python src/main.py --mode status 2>/dev/null || echo "Status query failed"
