name: Test FMP API

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests -q
      - name: Test FMP API Key
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          python3 - << 'PYEOF'
          import requests, os

          key = os.environ.get("FMP_API_KEY", "")
          print(f"Key length: {len(key)} chars")

          base = "https://financialmodelingprep.com/api"

          # Test endpoints from free to paid
          tests = [
              ("/v3/profile/AAPL",         "Profile (free)"),
              ("/v3/stock/list",            "Full stock list (paid)"),
              ("/v3/available-traded/list", "Traded list (free)"),
              ("/v3/financial-statement-symbol-lists", "Symbol list (free)"),
              ("/v3/stock-screener?limit=10&exchange=XETRA", "Screener XETRA"),
              ("/v3/stock-screener?limit=10&country=DE",     "Screener DE"),
          ]

          for ep, desc in tests:
              url = f"{base}{ep}{'&' if '?' in ep else '?'}apikey={key}"
              r = requests.get(url, timeout=10)
              if r.status_code == 200:
                  data = r.json()
                  count = len(data) if isinstance(data, list) else "object"
                  print(f"✅ {desc}: {count} results")
              else:
                  print(f"❌ {desc}: HTTP {r.status_code} — {r.text[:100]}")
          PYEOF
