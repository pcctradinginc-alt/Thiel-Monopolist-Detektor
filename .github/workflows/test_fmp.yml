name: Test FMP API

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests -q
      - name: Test SIX exchange code
        env:
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
        run: |
          python3 - << 'PYEOF'
          import requests, os
          key = os.environ.get("EODHD_API_KEY", "")
          for code in ["SW", "SWX", "VX", "EUFUND", "LSE", "BE"]:
              r = requests.get(f"https://eodhd.com/api/exchange-symbol-list/{code}?api_token={key}&fmt=json&type=common_stock", timeout=10)
              if r.status_code == 200:
                  d = r.json()
                  print(f"✅ {code}: {len(d)} Aktien — Beispiel: {d[0].get('Code','?')}.{code} / {d[0].get('Name','?')[:30]}")
              else:
                  print(f"❌ {code}: HTTP {r.status_code}")
          PYEOF
