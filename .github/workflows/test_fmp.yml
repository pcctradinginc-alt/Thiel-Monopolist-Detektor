name: Test FMP API

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests -q
      - name: Check EODHD plan
        env:
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
        run: |
          python3 - << 'PYEOF'
          import requests, os, json
          key = os.environ.get("EODHD_API_KEY", "")
          r = requests.get(f"https://eodhd.com/api/user?api_token={key}&fmt=json", timeout=10)
          d = r.json()
          print(json.dumps(d, indent=2))
          PYEOF
