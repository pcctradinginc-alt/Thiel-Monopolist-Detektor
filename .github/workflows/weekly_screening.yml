name: Screening — Wöchentlich (Batch API)

on:
  schedule:
    - cron: "0 6 * * 0"    # Sonntag 06:00 UTC → einziger Run: submit → 6h warten → collect
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "batch_submit"
        type: choice
        options:
          - batch_submit
          - batch_collect
          - full
          - status
      batch_id:
        description: "Batch ID for manual batch_collect (optional)"
        required: false

jobs:
  # ── Sonntag 06:00: Universe bauen, Filings holen, Batch einreichen ──
  batch-submit:
    name: Submit Batch (Sunday)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'batch_submit' ||
      github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # KRITISCH: Ohne diese DB startet jeder Lauf bei Null — Rotation,
      # consecutive_high_score_runs und Alert-Hysterese brauchen die Historie.
      - name: Restore DB from release (history)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data
          if gh release download db-latest --pattern thiel_detector.db --dir data --repo ${{ github.repository }}; then
            echo "DB aus Release db-latest wiederhergestellt"
          else
            echo "Kein db-latest Release gefunden — starte mit leerer DB (erster Lauf)"
          fi

      - name: Submit batch
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EULERPOOL_API_KEY: ${{ secrets.EULERPOOL_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SEC_CONTACT_EMAIL: ${{ secrets.SEC_CONTACT_EMAIL }}
        run: |
          mkdir -p data logs
          python src/main.py --mode batch_submit
          # Extract batch_id from DB and write to file for next job
          python3 -c "
          import sqlite3, sys
          try:
            conn = sqlite3.connect('data/thiel_detector.db')
            row = conn.execute(\"SELECT batch_id FROM batch_runs WHERE status='submitted' ORDER BY submitted_at DESC LIMIT 1\").fetchone()
            if row:
              print(row[0])
              open('data/batch_id.txt','w').write(row[0])
            else:
              print('NO_BATCH', file=sys.stderr)
          except Exception as e:
            print(f'ERROR: {e}', file=sys.stderr)
          "
          cat data/batch_id.txt

      - name: Upload DB + batch_id
        uses: actions/upload-artifact@v4
        with:
          name: thiel-db-latest
          path: |
            data/thiel_detector.db
            data/batch_id.txt
          retention-days: 7
          overwrite: true

  # ── ~6h warten, dann Ergebnisse abholen ──
  batch-collect:
    name: Collect Results (Sunday)
    runs-on: ubuntu-latest
    needs: batch-submit
    permissions:
      issues: write
      contents: write   # für Release-Upload der DB (db-latest)
    if: |
      always() && (
        (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'batch_collect') ||
        (github.event_name == 'schedule' && needs.batch-submit.result == 'success')
      )
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Wait 6 hours for Anthropic batch to complete
        if: github.event_name == 'schedule'
        run: |
          echo "Waiting 6 hours for batch processing..."
          sleep 21600

      - name: Find artifact run-id (nur bei manuellem Trigger)
        if: github.event_name == 'workflow_dispatch'
        id: find-artifact
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'thiel-db-latest',
              per_page: 1
            });
            if (artifacts.data.artifacts.length === 0) {
              core.setFailed('Kein thiel-db-latest Artifact gefunden — bitte zuerst batch_submit ausführen.');
              return;
            }
            const runId = artifacts.data.artifacts[0].workflow_run.id.toString();
            console.log(`Artifact gefunden in Run: ${runId}`);
            core.setOutput('run-id', runId);

      - name: Download DB + batch_id artifact
        uses: actions/download-artifact@v4
        with:
          name: thiel-db-latest
          path: data/
          run-id: ${{ github.event_name == 'workflow_dispatch' && steps.find-artifact.outputs.run-id || github.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect batch results
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
          GITHUB_REPO: pcctradinginc-alt/Thiel-Monopolist-Detektor
          COMPANIES_HOUSE_API_KEY: ${{ secrets.COMPANIES_HOUSE_API_KEY }}
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
          SEC_CONTACT_EMAIL: ${{ secrets.SEC_CONTACT_EMAIL }}
          MANUAL_BATCH_ID: ${{ github.event.inputs.batch_id }}
        run: |
          mkdir -p data logs
          # Use manual batch_id if provided, else read from file (guaranteed by needs: batch-submit)
          if [ -n "$MANUAL_BATCH_ID" ]; then
            echo "$MANUAL_BATCH_ID" > data/batch_id.txt
            echo "Using manual batch_id: $MANUAL_BATCH_ID"
          else
            echo "Using batch_id from artifact: $(cat data/batch_id.txt)"
          fi
          python src/main.py --mode batch_collect

      - name: Upload updated DB
        uses: actions/upload-artifact@v4
        with:
          name: thiel-db-latest
          path: |
            data/thiel_detector.db
            data/batch_id.txt
          retention-days: 30
          overwrite: true

      # Dauerhafte Persistenz: Release-Assets verfallen nicht (Artifacts schon).
      # Der nächste batch-submit lädt diese DB als Ausgangspunkt.
      - name: Persist DB to release
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f data/thiel_detector.db ]; then
            echo "Keine DB vorhanden — überspringe Release-Upload"
            exit 0
          fi
          if ! gh release view db-latest --repo ${{ github.repository }} >/dev/null 2>&1; then
            gh release create db-latest --title "DB Snapshot (auto)" \
              --notes "Automatisch aktualisierte SQLite-DB des Thiel Detectors. Wird von jedem Wochenlauf gelesen und überschrieben." \
              --repo ${{ github.repository }}
          fi
          gh release upload db-latest data/thiel_detector.db --clobber --repo ${{ github.repository }}
          echo "DB als Release-Asset db-latest gesichert"

  # ── Manuell: Status-Übersicht ──
  status:
    name: Show Status
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'status'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Download DB
        uses: actions/download-artifact@v4
        with:
          name: thiel-db-latest
          path: data/
        continue-on-error: true
      - name: Show status
        run: mkdir -p data logs && python src/main.py --mode status
