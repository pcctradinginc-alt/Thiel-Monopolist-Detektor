name: Weekly Thiel Screening

on:
  schedule:
    - cron: "0 19 * * 0"   # Sonntag 19:00 UTC → batch_submit
    - cron: "0 7 * * 1"    # Montag  07:00 UTC → batch_collect + alerts
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "batch_submit"
        type: choice
        options:
          - batch_submit
          - batch_collect
          - full
          - status

jobs:
  # ── Sonntag 19:00: Universe bauen, Filing-Daten holen, Batch einreichen ──
  batch-submit:
    name: Submit Batch (Sunday)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'batch_submit' ||
      github.event_name == 'schedule' && startsWith(github.event.schedule, '0 19')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Submit batch
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EULERPOOL_API_KEY: ${{ secrets.EULERPOOL_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data logs
          python src/main.py --mode batch_submit

      - name: Upload DB snapshot
        uses: actions/upload-artifact@v4
        with:
          name: thiel-db-latest
          path: data/thiel_detector.db
          retention-days: 7
          overwrite: true

  # ── Montag 07:00: Batch-Ergebnisse abholen, Alerts senden ──
  batch-collect:
    name: Collect Results (Monday)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'batch_collect' ||
      github.event_name == 'schedule' && startsWith(github.event.schedule, '0 7')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download latest DB snapshot
        uses: actions/download-artifact@v4
        with:
          name: thiel-db-latest
          path: data/
        continue-on-error: true  # first run has no artifact yet

      - name: Collect batch results
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data logs
          python src/main.py --mode batch_collect

      - name: Upload updated DB
        uses: actions/upload-artifact@v4
        with:
          name: thiel-db-latest
          path: data/thiel_detector.db
          retention-days: 30
          overwrite: true

  # ── Manuell: Status-Übersicht ──
  status:
    name: Show Status
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'status'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Download DB
        uses: actions/download-artifact@v4
        with:
          name: thiel-db-latest
          path: data/
        continue-on-error: true
      - name: Show status
        run: mkdir -p data logs && python src/main.py --mode status
