name: Screening — Wöchentlich (Batch API)

# Zwei getrennte Cron-Läufe statt eines Jobs mit 6h-Sleep:
# GitHub-Jobs haben ein hartes 6h-Limit — sleep 21600 + Collect wurde
# regelmäßig gekillt (Batches mussten manuell eingesammelt werden).
# Übergabe von DB + batch_id zwischen den Läufen über das Release-Asset
# db-latest (verfällt nicht, im Gegensatz zu Artifacts).
on:
  schedule:
    - cron: "0 6 * * 0"     # Sonntag 06:00 UTC → batch_submit
    - cron: "0 16 * * 0"    # Sonntag 16:00 UTC → batch_collect
    - cron: "0 20 * * 0"    # Sonntag 20:00 UTC → batch_collect (Backup, no-op wenn schon eingesammelt)
    - cron: "0 6 * * 1"     # Montag 06:00 UTC → batch_collect (letztes Backup — Anthropic-Batches laufen max. 24h)
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "batch_submit"
        type: choice
        options:
          - batch_submit
          - batch_collect
          - full
          - status
      batch_id:
        description: "Batch ID for manual batch_collect (optional)"
        required: false

jobs:
  # ── Sonntag 06:00: Universe bauen, Filings holen, Batch einreichen ──
  batch-submit:
    name: Submit Batch (Sunday)
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Release-Upload von DB + batch_id
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'batch_submit') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 6 * * 0')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # KRITISCH: Ohne diese DB startet jeder Lauf bei Null — Rotation,
      # consecutive_high_score_runs und Alert-Hysterese brauchen die Historie.
      - name: Restore DB from release (history)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data
          if gh release download db-latest --pattern thiel_detector.db --dir data --repo ${{ github.repository }}; then
            echo "DB aus Release db-latest wiederhergestellt"
          else
            echo "Kein db-latest Release gefunden — starte mit leerer DB (erster Lauf)"
          fi

      - name: Submit batch
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EULERPOOL_API_KEY: ${{ secrets.EULERPOOL_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SEC_CONTACT_EMAIL: ${{ secrets.SEC_CONTACT_EMAIL }}
        run: |
          mkdir -p data logs
          python src/main.py --mode batch_submit
          # batch_id aus DB extrahieren — der Collect-Lauf liest sie aus dem Release
          python3 -c "
          import sqlite3, sys
          try:
            conn = sqlite3.connect('data/thiel_detector.db')
            row = conn.execute(\"SELECT batch_id FROM batch_runs WHERE status='submitted' ORDER BY submitted_at DESC LIMIT 1\").fetchone()
            if row:
              print(row[0])
              open('data/batch_id.txt','w').write(row[0])
            else:
              print('NO_BATCH', file=sys.stderr)
              sys.exit(1)
          except Exception as e:
            print(f'ERROR: {e}', file=sys.stderr)
            sys.exit(1)
          "
          cat data/batch_id.txt

      - name: Persist DB + batch_id to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view db-latest --repo ${{ github.repository }} >/dev/null 2>&1; then
            gh release create db-latest --title "DB Snapshot (auto)" \
              --notes "Automatisch aktualisierte SQLite-DB des Thiel Detectors. Wird von jedem Wochenlauf gelesen und überschrieben." \
              --repo ${{ github.repository }}
          fi
          gh release upload db-latest data/thiel_detector.db data/batch_id.txt --clobber --repo ${{ github.repository }}
          echo "DB + batch_id als Release-Assets gesichert"

      - name: Upload DB artifact (debugging)
        uses: actions/upload-artifact@v4
        with:
          name: thiel-db-latest
          path: |
            data/thiel_detector.db
            data/batch_id.txt
          retention-days: 7
          overwrite: true

  # ── Sonntag 16:00 + 20:00 (Backup): Ergebnisse abholen, Report verschicken ──
  batch-collect:
    name: Collect Results (Sunday)
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write   # Release-Upload der aktualisierten DB
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'batch_collect') ||
      (github.event_name == 'schedule' && (github.event.schedule == '0 16 * * 0' || github.event.schedule == '0 20 * * 0' || github.event.schedule == '0 6 * * 1'))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore DB + batch_id from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data
          gh release download db-latest --pattern thiel_detector.db --dir data --repo ${{ github.repository }}
          gh release download db-latest --pattern batch_id.txt --dir data --repo ${{ github.repository }} || echo "Keine batch_id.txt im Release"

      - name: Collect batch results
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
          GITHUB_REPO: pcctradinginc-alt/Thiel-Monopolist-Detektor
          COMPANIES_HOUSE_API_KEY: ${{ secrets.COMPANIES_HOUSE_API_KEY }}
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
          SEC_CONTACT_EMAIL: ${{ secrets.SEC_CONTACT_EMAIL }}
          MANUAL_BATCH_ID: ${{ github.event.inputs.batch_id }}
        run: |
          mkdir -p data logs
          if [ -n "$MANUAL_BATCH_ID" ]; then
            echo "$MANUAL_BATCH_ID" > data/batch_id.txt
            echo "Using manual batch_id: $MANUAL_BATCH_ID"
          else
            echo "Using batch_id from release: $(cat data/batch_id.txt)"
          fi
          python src/main.py --mode batch_collect

      - name: Persist DB to release
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f data/thiel_detector.db ]; then
            echo "Keine DB vorhanden — überspringe Release-Upload"
            exit 0
          fi
          gh release upload db-latest data/thiel_detector.db --clobber --repo ${{ github.repository }}
          echo "DB als Release-Asset db-latest gesichert"

      - name: Upload DB artifact (debugging)
        uses: actions/upload-artifact@v4
        with:
          name: thiel-db-latest
          path: |
            data/thiel_detector.db
            data/batch_id.txt
          retention-days: 30
          overwrite: true

  # ── Manuell: Status-Übersicht ──
  status:
    name: Show Status
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'status'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Restore DB from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data
          gh release download db-latest --pattern thiel_detector.db --dir data --repo ${{ github.repository }} || true
      - name: Show status
        run: mkdir -p data logs && python src/main.py --mode status
