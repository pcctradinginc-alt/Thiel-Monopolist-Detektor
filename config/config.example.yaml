# Thiel Monopolist Detector — Konfiguration
# Kopiere diese Datei nach config.yaml und passe sie an

universe:
  # Harte Filter
  min_avg_daily_volume: 500000   # $500k/Tag — Tradability-Filter (war 10k, zu niedrig)
  exclude_types:
    - ETF
    - Fund
    - Warrant
    - Preferred
    - Unit
    - ADR

  # Zombie-Filter — wird in eu_prefilter + universe_builder angewendet
  zombie_filter:
    max_revenue_m: 10             # Revenue < $10M
    min_consecutive_negative_fcf_years: 3  # UND 3+ Jahre negativer FCF

  # ── 3-Schichten-Modell ────────────────────────────────────────────────────
  # Schicht 1 (high_conviction):   Manuell, keine SIC-Einschränkung, wöchentlich
  # Schicht 2 (moat_prone_sectors): Erweiterte SIC-Liste, alle 2 Wochen
  # Schicht 3 (broad_watch):        Sehr breit, alle 6 Wochen, kein Alerting
  #
  # rotation_tier: "core"     → alle 2 Wochen
  #                "extended" → alle 8 Wochen
  # Trigger-Bypass: neues Filing oder Score-Sprung → immer Tier 1

  cohorts:
    # ── SCHICHT 1: High Conviction (manuell, keine SIC-Einschränkung) ────────
    - id: high_conviction
      name: "High Conviction Watchlist"
      sic_codes: []               # bewusst leer = keine SIC-Einschränkung
      min_market_cap_m: 300
      rotation_tier: core         # wöchentlich — höchste Priorität
      alerting_enabled: true
      tickers:                    # Manuell gepflegte High-Conviction-Liste
        # Klassische Thiel-Monopolisten außerhalb Software-SIC
        - "TDG"    # TransDigm — Aerospace-Teile-Monopolist, 100%+ Pricing Power
        - "MCO"    # Moody's — Rating-Duopol, regulatorischer Moat
        - "SPGI"   # S&P Global — Daten-Monopolist, Pflichtkonsum
        - "MSCI"   # MSCI — Index-Monopol, jede Fondsgesellschaft braucht es
        - "POOL"   # Pool Corp — Vertriebsmonopolist Swimmingpool-Teile
        - "ENTG"   # Entegris — Semiconductor-Materialien Sole-Source
        - "FAST"   # Fastenal — Industrial Vending Lock-in
        - "ODFL"   # Old Dominion Freight — LTL Netzwerkeffekte
        - "WSO"    # Watsco — HVAC-Vertriebsplattform
        - "CSGP"   # CoStar — Gewerbeimmobilien-Datenmonopol
        - "VRSK"   # Verisk Analytics — Versicherungsdaten-Monopol
        - "ICE"    # Intercontinental Exchange — bereits Alert ausgelöst
        - "FICO"   # Fair Isaac — bereits Alert ausgelöst
        - "ISRG"   # Intuitive Surgical — bereits Alert ausgelöst

    # ── SCHICHT 2: Moat-Prone Sektoren (SIC-basiert, alle 2 Wochen) ─────────
    - id: moat_prone_sectors
      name: "Moat-Prone Sectors"
      sic_codes:
        # Software & Internet (bisheriger Kern)
        - "7370"  # Computer Programming Services
        - "7371"  # Custom Computer Programming
        - "7372"  # Prepackaged Software
        - "7373"  # Computer Integrated Systems Design
        - "7374"  # Data Processing Services
        - "7375"  # Information Retrieval Services
        - "7376"  # Computer Facilities Management
        - "7379"  # Computer Systems Design NEC
        # Daten & Information Services (sehr starke Moats)
        - "7389"  # Business Services NEC (Moody's, MSCI, S&P Global)
        - "7323"  # Credit Reporting Services
        - "6282"  # Investment Advice
        - "6199"  # Finance Services
        # Spezialisierte Industrie / Komponenten
        - "3728"  # Aircraft Parts (TransDigm-ähnlich)
        - "2819"  # Industrial Chemicals (Entegris-ähnlich)
        - "3841"  # Surgical Instruments
        - "3826"  # Laboratory Analytical Instruments
        - "3825"  # Instruments for Measuring
        - "3674"  # Semiconductors
        - "3812"  # Defense Electronics
        # Distribution mit Netzwerkeffekten / Lock-in
        - "5047"  # Medical & Hospital Equipment
        - "5065"  # Electronic Parts & Equipment
        - "5091"  # Sporting & Recreation Goods (Pool Corp)
        # Logistik-Plattformen
        - "4731"  # Freight Transportation Arrangement
      min_market_cap_m: 200
      rotation_tier: core         # alle 2 Wochen
      alerting_enabled: true

    # ── IPOs separat (immer höchste Priorität) ───────────────────────────────
    - id: ipo_recent
      name: "IPOs letzte 36 Monate"
      ipo_months_back: 36
      min_market_cap_m: 100
      rotation_tier: core         # wöchentlich
      alerting_enabled: true

    # ── SCHICHT 3: Broad Watch (sehr breit, alle 6-8 Wochen) ─────────────────
    - id: broad_watch
      name: "Broad Watchlist"
      sic_codes: []               # keine SIC-Einschränkung = alle US-Aktien
      min_market_cap_m: 150       # nur Mindest-Cap als Qualitätsfilter
      rotation_tier: extended     # alle 8 Wochen
      alerting_enabled: false     # erstmal nur Baseline — nach 2 Runs aktivieren

eu_universe:
  enabled: true
  exchanges:
    - xetra   # Deutschland (.DE)
    - six     # Schweiz (.SW)
    - aex     # Niederlande (.AS)
    - paris   # Frankreich (.PA)
    - omxs    # Schweden (.ST)
    - omxh    # Finnland (.HE)
    - omxc    # Dänemark (.CO)
    - ose     # Norwegen (.OL)
    - bru     # Belgien (.BR)
    - vienna  # Österreich (.VI)
  min_market_cap_m: 200
  alerting_enabled: true

screening:
  # LLM-Konfiguration
  model_screening: "claude-haiku-4-5-20251001"
  model_final: "claude-sonnet-4-6"
  max_calls_per_run: 750          # US + EU: ~10.700 Unternehmen / 750 = ~14 Wochen Rotation
  max_input_tokens_per_call: 12000
  rate_limit_rpm: 40
  rate_limit_tpm: 400000

  # Scoring-Schwellen
  use_batch_api: true               # Anthropic Batch API (50% günstiger, Ergebnisse in <24h)
  min_score_for_llm_call: 40        # Lane-Score ab dem LLM aufgerufen wird
  min_monopoly_score_alert: 65      # Minimum monopoly_score für Alert
  min_confidence_score_alert: 60    # Minimum confidence_score für Alert
  min_data_quality_score_alert: 55  # Minimum data_quality_score für Alert
  min_runs_for_strong: 2            # Wie viele Runs mit hohem Score für "Strong"

  # Candidate Lanes — Gewichtung (kein Ausschluss, nur Ranking)
  lanes:
    hidden_wedge:
      weight: 1.0
      keywords:
        - "mission-critical"
        - "system of record"
        - "embedded"
        - "switching costs"
        - "proprietary data"
        - "long-term contracts"
        - "multi-year agreements"
        - "workflow automation"
        - "regulatory compliance"
    emerging_platform:
      weight: 1.0
      keywords:
        - "platform"
        - "ecosystem"
        - "marketplace"
        - "developer community"
        - "interoperability"
        - "API"
        - "integration"
    scale_inflection:
      weight: 0.9
      # Zahlen-basiert: S&M/Rev fällt + Gross Margin steigt
    ipo_narrow:
      weight: 0.8
      # IPOs der letzten 36 Monate mit S-1
    filing_change:
      weight: 0.7
      # Neue Keywords in aktuellem 10-K vs. Vorjahr
    manual_watchlist:
      weight: 1.0
      tickers: []  # Hier manuell Ticker eintragen

alerts:
  # Alert-Hysterese
  min_score_delta_for_alert: 8     # Mindestveränderung überschreibt Cooldown
  alert_cooldown_days: 21          # Kein zweiter Alert innerhalb von X Tagen (außer Delta >= 8)

  # Email-Konfiguration (via GitHub Secrets)
  email_subject_prefix: "[Thiel Detector]"

  # GitHub Issues
  create_github_issues: true
  github_repo: "pcctradinginc-alt/Thiel-Monopolist-Detektor"

eu_universe:
  enabled: true                   # EU-Universe aktiv (yfinance Pre-Filter + Bundesanzeiger)
  exchanges:
    - xetra                       # XETRA (DE): DAX/MDAX/SDAX/TecDAX + Hidden Champions
    - six                         # SIX Swiss Exchange (CH): SMI + SMIM
    - aex                         # Euronext Amsterdam (NL): AEX + AMX + AScX
    - vienna                      # Wiener Börse (AT): ATX Prime
    - paris                       # Euronext Paris (FR): CAC40 + SBF120
    - omxs                        # OMX Stockholm (SE): many Hidden Champions
    - omxh                        # OMX Helsinki (FI)
    - omxc                        # OMX Copenhagen (DK): Novo, Coloplast, GN
    - ose                         # Oslo Stock Exchange (NO)
    - bru                         # Euronext Brussels (BE): Barco, Melexis etc.
  min_market_cap_m: 50            # Small Caps einschließen (€50M+)
  ipo_months_back: 18             # EU-IPOs der letzten N Monate screenen
  eulerpool_api_key_env: "EULERPOOL_API_KEY"
  # Pre-Filter Schwellen (yfinance, kostenlos)
  prefilter:
    min_gross_margin_pct: 40
    min_operating_margin_pct: 5
    min_revenue_growth_pct: 3
    marketplace_om_exception_pct: 12  # Plattformen mit OM > 12% dürfen durch

persistence:
  # MVP: SQLite lokal + als Release Asset
  # Prod: Turso (URL + Token via GitHub Secrets)
  mode: "sqlite"          # "sqlite" oder "turso"
  sqlite_path: "data/thiel_detector.db"

logging:
  level: "INFO"
  log_to_file: true
  log_path: "logs/run.log"
