# Thiel Monopolist Detector — Konfiguration
# Kopiere diese Datei nach config.yaml und passe sie an

universe:
  # Harte Filter
  min_avg_daily_volume: 500000   # $500k/Tag — Tradability-Filter
  exclude_types:
    - ETF
    - Fund
    - Warrant
    - Preferred
    - Unit
    - ADR

  # Zombie-Filter — wird in eu_prefilter + universe_builder angewendet
  zombie_filter:
    max_revenue_m: 10             # Revenue < $10M
    min_consecutive_negative_fcf_years: 3  # UND 3+ Jahre negativer FCF

  # ── 3-Schichten-Modell ────────────────────────────────────────────────────
  # rotation_tier: "core"     → alle 2 Wochen
  #                "extended" → alle 8 Wochen
  # Trigger-Bypass: neues Filing oder Score-Sprung → immer Tier 1

  cohorts:
    # ── SCHICHT 1: Auto-promoted High Conviction ─────────────────────────────
    # Befüllt sich selbst: monopoly_score >= 65 in mind. 2 Runs → auto-promoted
    - id: high_conviction
      name: "Auto-Promoted High Conviction"
      sic_codes: []
      min_market_cap_m: 0
      rotation_tier: core
      alerting_enabled: true
      auto_promote:
        min_monopoly_score: 65
        min_consecutive_runs: 2

    # ── SCHICHT 2: Moat-Prone Sektoren (SIC-basiert, alle 2 Wochen) ─────────
    - id: moat_prone_sectors
      name: "Moat-Prone Sectors"
      sic_codes:
        # Software & Internet
        - "7370"  # Computer Programming Services
        - "7371"  # Custom Computer Programming
        - "7372"  # Prepackaged Software
        - "7373"  # Computer Integrated Systems Design
        - "7374"  # Data Processing Services
        - "7375"  # Information Retrieval Services
        - "7376"  # Computer Facilities Management
        - "7379"  # Computer Systems Design NEC
        # Daten & Information Services
        - "7389"  # Business Services NEC (Moody's, MSCI, S&P Global)
        - "7323"  # Credit Reporting Services
        - "6282"  # Investment Advice
        - "6199"  # Finance Services
        # Spezialisierte Industrie / Komponenten
        - "3728"  # Aircraft Parts (TransDigm-ähnlich)
        - "2819"  # Industrial Chemicals (Entegris-ähnlich)
        - "3841"  # Surgical Instruments
        - "3826"  # Laboratory Analytical Instruments
        - "3825"  # Instruments for Measuring
        - "3674"  # Semiconductors
        - "3812"  # Defense Electronics
        # Distribution mit Netzwerkeffekten
        - "5047"  # Medical & Hospital Equipment
        - "5065"  # Electronic Parts & Equipment
        - "5091"  # Sporting & Recreation Goods (Pool Corp)
        - "4731"  # Freight Transportation Arrangement
        # Netzwerk-Infrastruktur (Exchange/Transport Monopole)
        - "4213"  # Trucking (ODFL, Saia — LTL Netzwerk-Monopol)
        - "4011"  # Railroads (Infrastruktur-Moat)
        - "6221"  # Commodity Contracts Dealers (CME — Derivatives Exchange)
        - "6211"  # Security Brokers (IBKR — Broker-Technologie Lock-in)
      min_market_cap_m: 200
      rotation_tier: core
      alerting_enabled: true

    # ── IPOs (immer höchste Priorität) ──────────────────────────────────────
    - id: ipo_recent
      name: "IPOs letzte 36 Monate"
      ipo_months_back: 36
      min_market_cap_m: 100
      rotation_tier: core
      alerting_enabled: true

    # ── SCHICHT 3: Broad Watch (alle 8 Wochen, Baseline) ────────────────────
    - id: broad_watch
      name: "Broad Watchlist"
      sic_codes: []
      min_market_cap_m: 150
      rotation_tier: extended
      alerting_enabled: false     # nach 2 Baseline-Runs aktivieren

eu_universe:
  enabled: true
  exchanges:
    - xetra    # XETRA (DE): DAX/MDAX/SDAX/TecDAX + Hidden Champions
    - six      # SIX Swiss Exchange (CH): SMI + SMIM
    - aex      # Euronext Amsterdam (NL): AEX + AMX + AScX
    - vienna   # Wiener Börse (AT): ATX Prime
    - paris    # Euronext Paris (FR): CAC40 + SBF120
    - omxs     # OMX Stockholm (SE): many Hidden Champions
    - omxh     # OMX Helsinki (FI)
    - omxc     # OMX Copenhagen (DK): Novo, Coloplast, GN
    - ose      # Oslo Stock Exchange (NO)
    - bru      # Euronext Brussels (BE): Barco, Melexis etc.
  min_market_cap_m: 50            # Small Caps einschließen (€50M+)
  ipo_months_back: 18             # EU-IPOs der letzten N Monate screenen

screening:
  model_screening: "claude-haiku-4-5-20251001"
  model_final: "claude-sonnet-4-6"
  max_calls_per_run: 750
  max_input_tokens_per_call: 12000
  rate_limit_rpm: 40
  rate_limit_tpm: 400000
  use_batch_api: true
  min_score_for_llm_call: 55        # Lane-Score-Schwelle vor LLM-Call
  min_monopoly_score_alert: 65
  min_confidence_score_alert: 60
  min_data_quality_score_alert: 55
  min_runs_for_strong: 2

  lanes:
    hidden_wedge:
      weight: 1.0
      keywords:
        - "mission-critical"
        - "system of record"
        - "embedded"
        - "switching costs"
        - "proprietary data"
        - "long-term contracts"
        - "multi-year agreements"
        - "workflow automation"
        - "regulatory compliance"
    emerging_platform:
      weight: 1.0
      keywords:
        - "platform"
        - "ecosystem"
        - "marketplace"
        - "developer community"
        - "interoperability"
        - "API"
        - "integration"
    scale_inflection:
      weight: 0.9
      # Zahlen-basiert: S&M/Rev fällt + Gross Margin steigt
    ipo_narrow:
      weight: 0.8
      # IPOs der letzten 36 Monate mit S-1
    filing_change:
      weight: 0.7
      # Neue Keywords in aktuellem 10-K vs. Vorjahr
    manual_watchlist:
      weight: 1.0
      tickers: []

alerts:
  min_score_delta_for_alert: 8          # Score-Sprung überschreibt Cooldown
  alert_cooldown_days: 21               # Kein zweiter Alert (außer Delta >= 8 oder MOAT_RISK)
  min_consecutive_runs_for_strong: 2    # Runs mit Score >= 65 für STRONG-Status
  email_subject_prefix: "[Thiel Detector]"
  create_github_issues: true
  github_repo: "pcctradinginc-alt/Thiel-Monopolist-Detektor"

persistence:
  mode: "sqlite"                  # einziger unterstützter Modus
  sqlite_path: "data/thiel_detector.db"

logging:
  level: "INFO"
  log_to_file: true
  log_path: "logs/run.log"
